<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판</title>
  <link rel="stylesheet" href="board.css">
</head>
<body>
  <header class="topbar">
    <h1>게시판</h1>
    <nav class="auth-area" id="auth-area"></nav>
  </header>

  <main class="container">
    <section id="auth-panel" class="card auth-panel hidden">
      <div class="tabs">
        <button class="tab active" data-tab="login">로그인</button>
        <button class="tab" data-tab="register">회원가입</button>
      </div>
      <form id="login-form" class="auth-form">
        <input name="username" placeholder="아이디" autocomplete="username" required>
        <input name="password" type="password" placeholder="비밀번호" autocomplete="current-password" required>
        <button type="submit">로그인</button>
        <p class="form-error" id="login-error"></p>
      </form>
      <form id="register-form" class="auth-form hidden">
        <input name="username" placeholder="아이디 (2~20자)" autocomplete="username" required>
        <input name="password" type="password" placeholder="비밀번호 (4자 이상)" autocomplete="new-password" required>
        <button type="submit">회원가입</button>
        <p class="form-error" id="register-error"></p>
      </form>
    </section>

    <section id="write-panel" class="card hidden">
      <h2>새 글 작성</h2>
      <form id="post-form" class="post-form">
        <input name="title" placeholder="제목" maxlength="100" required>
        <textarea name="content" placeholder="내용을 입력하세요" rows="6" maxlength="5000" required></textarea>
        <div class="form-actions">
          <button type="button" id="cancel-write" class="ghost">취소</button>
          <button type="submit">등록</button>
        </div>
        <p class="form-error" id="post-error"></p>
      </form>
    </section>

    <section class="toolbar">
      <button id="new-post-btn" class="primary hidden">+ 새 글</button>
      <button id="refresh-btn" class="ghost">새로고침</button>
    </section>

    <section id="posts" class="posts">
      <p class="empty" id="loading">불러오는 중...</p>
    </section>
  </main>

  <script src="board.js"></script>
</body>
</html>
