<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 회원 관리</title>
  <link rel="stylesheet" href="board.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header class="topbar">
    <h1>관리자 · 회원 관리</h1>
    <nav class="auth-area" id="auth-area"></nav>
  </header>

  <main class="container">
    <section id="gate" class="card hidden">
      <p id="gate-msg">권한을 확인하는 중...</p>
    </section>

    <section id="panel" class="card hidden">
      <div class="admin-stats">
        <div><strong id="user-count">0</strong>명의 회원</div>
        <button id="refresh-btn" class="ghost">새로고침</button>
      </div>
      <table class="user-table">
        <thead>
          <tr>
            <th>아이디</th>
            <th>가입일</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="user-rows">
          <tr><td colspan="3" class="empty">불러오는 중...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
